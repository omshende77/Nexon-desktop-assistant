services:
  - type: web
    name: nexon-ai
    env: python
    buildCommand: pip install -r Requirements.txt && cd nexon-ui && npm install && npm run build
    startCommand: uvicorn server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DEPLOYMENT_MODE
        value: production
